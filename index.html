<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Luna Axlt — Форум</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            padding: 10px;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #121212;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }

        .header {
            background: linear-gradient(145deg, #1e1e1e, #141414);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid #f5cb5c;
        }

        .header h1 {
            color: #f5cb5c;
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .header p {
            color: #aaa;
        }

        .btn {
            background: #f5cb5c;
            color: #121212;
            border: none;
            border-radius: 40px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
        }

        .btn-outline {
            background: transparent;
            color: #f5cb5c;
            border: 2px solid #f5cb5c;
        }

        .nav-wrapper {
            overflow-x: auto;
            white-space: nowrap;
            background-color: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }

        .nav {
            display: inline-flex;
            padding: 5px 10px;
        }

        .nav button {
            background: none;
            border: none;
            color: #999;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px 25px;
            border-radius: 40px;
            cursor: pointer;
        }

        .nav button.active {
            color: #121212;
            background-color: #f5cb5c;
        }

        .content {
            padding: 20px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .topic-card {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #f5cb5c;
        }

        .topics-list {
            background: #1e1e1e;
            border-radius: 15px;
            overflow: hidden;
        }

        .topic-item {
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .topic-item:hover {
            background: #2a2a2a;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-card {
            background: #1e1e1e;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            border: 2px solid #f5cb5c;
        }

        .modal-card input,
        .modal-card textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a2a2a;
            border: none;
            border-radius: 10px;
            color: white;
        }

        .footer {
            padding: 20px;
            text-align: center;
            color: #666;
            border-top: 1px solid #2a2a2a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Luna Axlt</h1>
            <p>ФОРУМ СООБЩЕСТВА</p>
            <div style="margin-top: 20px;">
                <button class="btn" id="loginBtn" onclick="openModal('login')">Вход</button>
                <button class="btn-outline" id="registerBtn" onclick="openModal('register')">Регистрация</button>
                <button class="btn-outline" id="profileBtn" style="display:none;" onclick="showProfile()">Профиль</button>
            </div>
        </div>

        <div class="nav-wrapper">
            <div class="nav">
                <button class="active" onclick="showSection('forum')">Форум</button>
                <button onclick="showSection('online')">Кто онлайн</button>
                <button id="adminBtn" style="display:none;" onclick="showSection('admin')">Админка</button>
            </div>
        </div>

        <div class="content">
            <div id="forumSection" class="section active">
                <button class="btn" style="margin-bottom: 20px;" onclick="openNewTopicModal()">➕ Новая тема</button>
                <div id="topicsList" class="topics-list">
                    <p style="text-align:center; padding:30px;">Загрузка...</p>
                </div>
            </div>

            <div id="onlineSection" class="section">
                <div class="topic-card" id="onlineList"></div>
            </div>

            <div id="adminSection" class="section">
                <div class="topic-card" id="adminPanel"></div>
            </div>
        </div>

        <div class="footer">
            Luna Axlt Studios · 2026
        </div>
    </div>

    <!-- Модальные окна -->
    <div class="modal" id="authModal">
        <div class="modal-card">
            <h3 id="authTitle">Вход</h3>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPass" placeholder="Пароль">
            <div id="registerFields" style="display:none;">
                <input type="text" id="authUsername" placeholder="Никнейм">
            </div>
            <button class="btn" id="authBtn" onclick="handleAuth()">Войти</button>
            <p style="text-align:center; margin-top:15px;">
                <a href="#" onclick="toggleAuthMode()" style="color:#f5cb5c;" id="authToggle">Нет аккаунта? Зарегистрироваться</a>
            </p>
        </div>
    </div>

    <div class="modal" id="newTopicModal">
        <div class="modal-card">
            <h3>Новая тема</h3>
            <input type="text" id="topicTitle" placeholder="Заголовок">
            <textarea id="topicContent" rows="4" placeholder="Текст сообщения"></textarea>
            <button class="btn" onclick="createTopic()">Создать тему</button>
        </div>
    </div>

    <div class="modal" id="replyModal">
        <div class="modal-card">
            <h3>Ответить</h3>
            <textarea id="replyContent" rows="4" placeholder="Ваш ответ"></textarea>
            <button class="btn" onclick="sendReply()">Отправить</button>
        </div>
    </div>

    <script>
        // Supabase config
        const supabase = window.supabase.createClient(
            'https://luna-axlt-forum.supabase.co',
            'sb_publishable_wCEqbtTXXiTq6ThccQe4fA_K-61hi-G'
        );

        let currentUser = null;
        let isLoginMode = true;
        let currentTopic = null;

        checkUser();
        loadTopics();

        async function checkUser() {
            const { data } = await supabase.auth.getUser();
            if (data.user) {
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', data.user.id)
                    .single();
                if (profile) {
                    currentUser = { ...data.user, profile };
                    document.getElementById('loginBtn').style.display = 'none';
                    document.getElementById('registerBtn').style.display = 'none';
                    document.getElementById('profileBtn').style.display = 'inline-block';
                }
            }
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            
            if (section === 'forum') {
                document.getElementById('forumSection').classList.add('active');
                event.target.classList.add('active');
                loadTopics();
            } else if (section === 'online') {
                document.getElementById('onlineSection').classList.add('active');
                event.target.classList.add('active');
                loadOnlineUsers();
            }
        }

        function openModal(mode) {
            isLoginMode = mode === 'login';
            document.getElementById('authTitle').innerText = isLoginMode ? 'Вход' : 'Регистрация';
            document.getElementById('authBtn').innerText = isLoginMode ? 'Войти' : 'Зарегистрироваться';
            document.getElementById('registerFields').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('authToggle').innerText = isLoginMode ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
            document.getElementById('authModal').style.display = 'flex';
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? 'Вход' : 'Регистрация';
            document.getElementById('authBtn').innerText = isLoginMode ? 'Войти' : 'Зарегистрироваться';
            document.getElementById('registerFields').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('authToggle').innerText = isLoginMode ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;

            if (isLoginMode) {
                const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
                if (error) return alert(error.message);
                alert('Добро пожаловать!');
            } else {
                const username = document.getElementById('authUsername').value;
                const { data, error } = await supabase.auth.signUp({ email, password: pass });
                if (error) return alert(error.message);
                await supabase.from('profiles').insert({
                    id: data.user.id,
                    username,
                    avatar_emoji: '😎'
                });
                alert('Регистрация успешна!');
            }
            closeModal('authModal');
            checkUser();
        }

        async function loadTopics() {
            const { data } = await supabase
                .from('topics')
                .select('*, profiles(username)')
                .order('created_at', { ascending: false });

            let html = '<div class="topics-list">';
            if (data?.length) {
                data.forEach(t => {
                    html += `
                        <div class="topic-item" onclick="viewTopic(${t.id})">
                            <span>${t.title}</span>
                            <span style="color:#888;">${t.profiles?.username || 'User'}</span>
                        </div>
                    `;
                });
            } else {
                html += '<p style="text-align:center; padding:30px;">Пока нет тем</p>';
            }
            html += '</div>';
            document.getElementById('topicsList').innerHTML = html;
        }

        async function viewTopic(id) {
            currentTopic = id;
            const { data: topic } = await supabase
                .from('topics')
                .select('*, profiles(username)')
                .eq('id', id)
                .single();
            
            const { data: posts } = await supabase
                .from('posts')
                .select('*, profiles(username)')
                .eq('topic_id', id)
                .order('created_at');

            let html = `<button class="btn" onclick="loadTopics()" style="margin-bottom:20px;">← Назад</button>`;
            html += `<div class="topic-card">`;
            html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">`;
            html += `<span style="color:#f5cb5c;">${topic.profiles?.username}</span>`;
            html += `<span style="color:#888;">${new Date(topic.created_at).toLocaleString()}</span>`;
            html += `</div><div>${topic.content}</div></div>`;

            posts?.forEach(p => {
                html += `<div class="topic-card">`;
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">`;
                html += `<span style="color:#f5cb5c;">${p.profiles?.username}</span>`;
                html += `<span style="color:#888;">${new Date(p.created_at).toLocaleString()}</span>`;
                html += `</div><div>${p.content}</div></div>`;
            });

            if (currentUser) {
                html += `<button class="btn" style="margin-top:20px;" onclick="openReplyModal()">Ответить</button>`;
            }

            document.getElementById('topicsList').innerHTML = html;
        }

        function openNewTopicModal() {
            if (!currentUser) return alert('Сначала войдите');
            document.getElementById('newTopicModal').style.display = 'flex';
        }

        async function createTopic() {
            const title = document.getElementById('topicTitle').value;
            const content = document.getElementById('topicContent').value;
            if (!title || !content) return alert('Заполните поля');

            const { error } = await supabase.from('topics').insert({
                title,
                content,
                author_id: currentUser.id
            });

            if (error) return alert(error.message);
            alert('Тема создана!');
            closeModal('newTopicModal');
            loadTopics();
        }

        function openReplyModal() {
            document.getElementById('replyModal').style.display = 'flex';
        }

        async function sendReply() {
            const content = document.getElementById('replyContent').value;
            if (!content) return alert('Введите ответ');

            const { error } = await supabase.from('posts').insert({
                topic_id: currentTopic,
                content,
                author_id: currentUser.id
            });

            if (error) return alert(error.message);
            alert('Ответ отправлен!');
            closeModal('replyModal');
            viewTopic(currentTopic);
        }

        async function loadOnlineUsers() {
            const fiveMinAgo = new Date(Date.now() - 5*60000).toISOString();
            const { data } = await supabase
                .from('profiles')
                .select('username, last_seen')
                .gte('last_seen', fiveMinAgo);

            let html = '<h3 style="color:#f5cb5c;">Сейчас на форуме</h3>';
            if (data?.length) {
                data.forEach(u => {
                    html += `<p>${u.username}</p>`;
                });
            } else {
                html += '<p>Нет пользователей онлайн</p>';
            }
            document.getElementById('onlineList').innerHTML = html;
        }

        function showProfile() {
            if (!currentUser) return;
            
            let html = `
                <h3 style="color:#f5cb5c;">Мой профиль</h3>
                <p>Ник: ${currentUser.profile?.username}</p>
                <p>Email: ${currentUser.email}</p>
                <button class="btn" onclick="logout()">Выйти</button>
            `;
            document.getElementById('topicsList').innerHTML = html;
            showSection('forum');
        }

        async function logout() {
            await supabase.auth.signOut();
            currentUser = null;
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('registerBtn').style.display = 'inline-block';
            document.getElementById('profileBtn').style.display = 'none';
            alert('Вы вышли');
            loadTopics();
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }
    </script>
</body>
</html>
