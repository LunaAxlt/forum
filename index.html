<!DOCTYPE html>
<html>
<head>
    <title>Проверка Supabase</title>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Проверка связи с базой данных</h1>
    <div id="status">Проверяю...</div>
    <button onclick="testConnection()">Проверить соединение</button>

    <script>
        const supabase = window.supabase.createClient(
            'https://luna-axlt-forum.supabase.co',
            'sb_publishable_wCEqbtTXXiTq6ThccQe4fA_K-61hi-G'
        );

        async function testConnection() {
            document.getElementById('status').innerText = 'Соединение...';
            const { data, error } = await supabase
                .from('topics')
                .select('count');
            
            if (error) {
                document.getElementById('status').innerText = '❌ Ошибка: ' + error.message;
                console.error(error);
            } else {
                document.getElementById('status').innerText = '✅ Подключение работает!';
            }
        }
    </script>
</body>
</html>
