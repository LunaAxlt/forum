<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #0a0a0a; color: white; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 10px; margin: 10px 0; }
        button { background: #f5cb5c; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        input { padding: 10px; margin: 5px; width: 100%; background: #333; border: none; color: white; }
    </style>
</head>
<body>
    <h1 style="color:#f5cb5c;">Тест подключения к Supabase</h1>
    
    <div class="card">
        <h3>1. Проверка базы данных</h3>
        <button onclick="testDB()">Проверить соединение</button>
        <div id="dbResult"></div>
    </div>

    <div class="card">
        <h3>2. Регистрация</h3>
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPass" placeholder="Пароль">
        <input type="text" id="regName" placeholder="Никнейм">
        <button onclick="testRegister()">Зарегистрироваться</button>
        <div id="regResult"></div>
    </div>

    <div class="card">
        <h3>3. Вход</h3>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPass" placeholder="Пароль">
        <button onclick="testLogin()">Войти</button>
        <div id="loginResult"></div>
        <div id="userInfo" style="margin-top:10px; color:#f5cb5c;"></div>
    </div>

    <div class="card">
        <h3>4. Создать тестовую тему</h3>
        <input type="text" id="topicTitle" placeholder="Название темы">
        <textarea id="topicContent" rows="3" placeholder="Текст темы" style="width:100%; padding:10px; background:#333; color:white; border:none;"></textarea>
        <button onclick="createTestTopic()">Создать тему</button>
        <div id="topicResult"></div>
    </div>

    <div class="card">
        <h3>5. Последние темы</h3>
        <button onclick="loadTopics()">Показать темы</button>
        <div id="topicsList"></div>
    </div>

    <script>
        // Подключаемся к Supabase
        const supabase = window.supabase.createClient(
            'https://luna-axlt-forum.supabase.co',
            'sb_publishable_wCEqbtTXXiTq6ThccQe4fA_K-61hi-G'
        );

        // 1. Проверка БД
        async function testDB() {
            const { data, error } = await supabase.from('topics').select('count').limit(1);
            document.getElementById('dbResult').innerHTML = error 
                ? '❌ Ошибка: ' + error.message 
                : '✅ База данных работает!';
        }

        // 2. Регистрация
        async function testRegister() {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const name = document.getElementById('regName').value;

            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: pass
            });

            if (error) {
                document.getElementById('regResult').innerHTML = '❌ ' + error.message;
                return;
            }

            // Создаем профиль
            await supabase.from('profiles').insert({
                id: data.user.id,
                username: name,
                avatar_emoji: '😎',
                role_id: 5
            });

            document.getElementById('regResult').innerHTML = '✅ Регистрация успешна! Проверь почту.';
        }

        // 3. Вход
        async function testLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: pass
            });

            if (error) {
                document.getElementById('loginResult').innerHTML = '❌ ' + error.message;
                return;
            }

            document.getElementById('loginResult').innerHTML = '✅ Вход выполнен!';
            document.getElementById('userInfo').innerHTML = 'Пользователь: ' + data.user.email;
        }

        // 4. Создать тему
        async function createTestTopic() {
            const title = document.getElementById('topicTitle').value;
            const content = document.getElementById('topicContent').value;

            const { data: { user } } = await supabase.auth.getUser();
            
            if (!user) {
                document.getElementById('topicResult').innerHTML = '❌ Сначала войди';
                return;
            }

            const { error } = await supabase.from('topics').insert({
                title: title,
                content: content,
                author_id: user.id
            });

            document.getElementById('topicResult').innerHTML = error ? '❌ ' + error.message : '✅ Тема создана!';
        }

        // 5. Показать темы
        async function loadTopics() {
            const { data, error } = await supabase
                .from('topics')
                .select('*, profiles(username)')
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('topicsList').innerHTML = '❌ ' + error.message;
                return;
            }

            let html = '';
            data.forEach(t => {
                html += `
                    <div style="background:#333; padding:10px; margin:5px; border-radius:5px;">
                        <b>${t.title}</b><br>
                        ${t.content}<br>
                        <small>Автор: ${t.profiles?.username || 'User'} | ${new Date(t.created_at).toLocaleString()}</small>
                    </div>
                `;
            });
            document.getElementById('topicsList').innerHTML = html;
        }
    </script>
</body>
</html>
