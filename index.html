<!DOCTYPE html>
<html>
<head>
    <title>Тест Supabase</title>
    <!-- ДРУГОЙ СПОСОБ ПОДКЛЮЧЕНИЯ -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Тест подключения</h1>
    <button onclick="test()">Проверить</button>
    <div id="out" style="margin-top:20px; padding:10px; border:1px solid #f5cb5c;"></div>

    <script>
        const { createClient } = window.supabase;
        const supabase = createClient(
            'https://luna-axlt-forum.supabase.co',
            'sb_publishable_wCEqbtTXXiTq6ThccQe4fA_K-61hi-G'
        );

        async function test() {
            const out = document.getElementById('out');
            out.innerHTML = 'Проверяю...';
            
            try {
                const { error } = await supabase.from('topics').select('*').limit(1);
                if (error) out.innerHTML = '❌ Ошибка: ' + error.message;
                else out.innerHTML = '✅ Успех!';
            } catch(e) {
                out.innerHTML = '❌ Ошибка: ' + e.message;
            }
        }
    </script>
</body>
</html>
