<!DOCTYPE html>
<html>
<head>
    <title>Проверка Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Тест подключения к Supabase</h1>
    <div id="status">Проверяю...</div>
    <button onclick="testConnection()">Проверить соединение</button>

    <script>
        const supabase = window.supabase.createClient(
            'https://luna-axlt-forum.supabase.co',
            'sb_publishable_wCEqbtTXXiTq6ThccQe4fA_K-61hi-G'
        );

        async function testConnection() {
            const { data, error } = await supabase
                .from('topics')
                .select('count')
                .limit(1);
            
            document.getElementById('status').innerHTML = error 
                ? '❌ Ошибка: ' + error.message 
                : '✅ Подключение работает!';
        }
    </script>
</body>
</html>
