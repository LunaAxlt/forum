<!DOCTYPE html>
<html>
<head>
    <title>Тест Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Тест подключения к Supabase</h1>
    <button onclick="testConnection()">Проверить</button>
    <div id="result" style="margin-top:20px; padding:10px; border:1px solid #333;"></div>

    <script>
        const supabase = window.supabase.createClient(
            'https://luna-axlt-forum.supabase.co',
            'sb_publishable_wCEqbtTXXiTq6ThccQe4fA_K-61hi-G'
        );

        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Проверяю...';
            
            try {
                // Пробуем получить версию Supabase (это должно работать всегда)
                const { data, error } = await supabase
                    .from('_dummy')
                    .select('*')
                    .limit(1);
                
                if (error) {
                    resultDiv.innerHTML = '❌ Ошибка: ' + error.message;
                } else {
                    resultDiv.innerHTML = '✅ Соединение есть!';
                }
            } catch (e) {
                resultDiv.innerHTML = '❌ Критическая ошибка: ' + e.message;
            }
        }
    </script>
</body>
</html>
